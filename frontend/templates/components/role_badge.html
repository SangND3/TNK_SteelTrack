{% comment %}
Usage: {% include "components/role_badge.html" with user=request.user %}
{% endcomment %}
{% if user.is_authenticated %}
<span class="{{ user.role_badge_css }} inline-flex items-center px-2.5 py-0.5 rounded-full text-xs font-semibold"
      title="Vai trò: {{ user.get_role_display }}">
  {% if user.role == "admin" %}
  <svg class="w-3 h-3 mr-1" fill="currentColor" viewBox="0 0 20 20">
    <path fill-rule="evenodd" d="M9 12l2 2 4-4m5.618-4.016A11.955 11.955 0 0112 2.944a11.955 11.955 0 01-8.618 3.04A12.02 12.02 0 003 9c0 5.591 3.824 10.29 9 11.622 5.176-1.332 9-6.03 9-11.622 0-1.042-.133-2.052-.382-3.016z" clip-rule="evenodd"/>
  </svg>
  {% elif user.role == "manager" %}
  <svg class="w-3 h-3 mr-1" fill="currentColor" viewBox="0 0 20 20">
    <path d="M9 6a3 3 0 11-6 0 3 3 0 016 0zM17 6a3 3 0 11-6 0 3 3 0 016 0zM12.93 17c.046-.327.07-.66.07-1a6.97 6.97 0 00-1.5-4.33A5 5 0 0119 16v1h-6.07zM6 11a5 5 0 015 5v1H1v-1a5 5 0 015-5z"/>
  </svg>
  {% endif %}
  {{ user.get_role_display }}
</span>
{% endif %}
